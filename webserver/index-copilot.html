<!DOCTYPE html>
<html>
<head>
<title>Welcome to Vinylstation</title>

<style>
html { color-scheme: light dark; }

body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, Verdana, Arial, sans-serif;
  background-image: url('img/vinylstationbackground.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  height: 100vh;
  position: relative;
  transition: color 0.5s ease;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-color: rgba(50, 50, 50, 0.5);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 0;
}

body > * {
  position: relative;
  z-index: 1;
}

/* Data display */
.data-display {
  display: flex;
  gap: 20px;
  align-items: center;
  justify-content: center;
}

.data-display img {
  width: 200px;
  border-radius: 10px;
}

/* Error messages */
.error {
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
  font-size: 1.2em;
  backdrop-filter: blur(8px);
}

.error.missing { background: rgba(255, 165, 0, 0.3); }
.error.invalid { background: rgba(255, 0, 0, 0.3); }
.error.empty   { background: rgba(255, 255, 0, 0.3); }
.error.generic { background: rgba(200, 200, 200, 0.3); }

</style>
</head>

<script>
let previousData = null;

/* ---------- IMAGE LUMINANCE ---------- */

function getAverageLuminance(imageUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';

    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 50;
      canvas.height = 50;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 50, 50);

      const { data } = ctx.getImageData(0, 0, 50, 50);

      let total = 0;
      for (let i = 0; i < data.length; i += 4) {
        total += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
      }

      resolve(total / (data.length / 4));
    };

    img.onerror = () => resolve(128);
    img.src = imageUrl;
  });
}

async function adaptTextColour(imageUrl) {
  const raw = await getAverageLuminance(imageUrl);

  const overlay = 50;
  const opacity = 0.5;

  const effective = raw * (1 - opacity) + overlay * opacity;

  document.body.style.color = effective < 128 ? '#ffffff' : '#1a1a1a';
}
