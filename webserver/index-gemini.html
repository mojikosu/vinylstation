<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Vinylstation</title>
    <style>
        html { color-scheme: light dark; }
        body {
            margin: 0;
            padding: 0;
            font-family: Tahoma, Verdana, Arial, sans-serif;
            background-image: url('img/vinylstationbackground.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            position: relative;
            transition: color 0.5s ease; /* smooth colour transition */
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-color: rgba(50, 50, 50, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 0;
        }

        body > * {
            position: relative;
            z-index: 1;
        }

        /* Error Messaging Styles */
        .error-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(150, 150, 150, 0.3);
            border-radius: 12px;
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .error-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .error-detail {
            font-size: 1em;
            opacity: 0.9;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .error-technical {
            font-size: 0.8em;
            opacity: 0.6;
            font-family: monospace;
            background: rgba(0,0,0,0.1);
            padding: 5px;
            border-radius: 4px;
        }

        .data-display img {
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <center>
        <h1>Now playing on Vinylstation</h1>
        <div id="data-container">Loading data...</div>
    </center>

    <script>
        let previousData = null;

        /**
         * Samples an image URL and returns its average luminance (0–255).
         */
        function getAverageLuminance(imageUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width  = 50;
                    canvas.height = 50;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 50, 50);
                    const { data } = ctx.getImageData(0, 0, 50, 50);
                    let total = 0;
                    for (let i = 0; i < data.length; i += 4) {
                        total += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                    }
                    resolve(total / (data.length / 4));
                };
                img.onerror = () => resolve(128); 
                img.src = imageUrl;
            });
        }

        /**
         * Adjusts body text colour based on background brightness.
         */
        async function adaptTextColour(imageUrl) {
            const rawLuminance = await getAverageLuminance(imageUrl);
            const overlayLuminance = 50;
            const overlayOpacity  = 0.5;
            const effectiveLuminance = rawLuminance * (1 - overlayOpacity)
                                     + overlayLuminance * overlayOpacity;

            document.body.style.color = effectiveLuminance < 128 ? '#ffffff' : '#1a1a1a';
        }

        async function fetchData() {
            try {
                console.log("Fetching JSON data...");
                const response = await fetch('song.json');
                
                // 1. Check if file is missing
                if (!response.ok) {
                    if (response.status === 404) throw new Error("FILE_MISSING");
                    throw new Error(`HTTP_ERROR_${response.status}`);
                }

                // 2. Check for invalid JSON
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    throw new Error("INVALID_JSON");
                }

                // 3. Check for empty/missing track data
                if (!data || !data.track || Object.keys(data.track).length === 0) {
                    throw new Error("NO_TRACK_DATA");
                }

                // Update Background
                const bgUrl = data.track.images?.background;
                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    await adaptTextColour(bgUrl);
                }

                // Update UI if data changed
                if (JSON.stringify(data) !== JSON.stringify(previousData)) {
                    updateUI(data);
                    previousData = data;
                }
            } catch (error) {
                renderError(error.message);
            }
        }

        function renderError(msg) {
            let icon = "📻", title = "Tuning in...", detail = "Connection lost.", tech = msg;

            if (msg === "FILE_MISSING") {
                icon = "📂"; title = "File Not Found"; 
                detail = "The 'song.json' file is missing from the server.";
            } else if (msg === "INVALID_JSON") {
                icon = "🧩"; title = "Data Error"; 
                detail = "The song data is corrupted or improperly formatted.";
            } else if (msg === "NO_TRACK_DATA") {
                icon = "💿"; title = "Station Quiet"; 
                detail = "The file is there, but no track info was found.";
            }

            document.getElementById('data-container').innerHTML = `
                <div class="error-box">
                    <div class="error-icon">${icon}</div>
                    <div class="error-title">${title}</div>
                    <div class="error-detail">${detail}</div>
                    <div class="error-technical">Code: ${tech}</div>
                </div>
            `;
        }

        function updateUI(data) {
            const container = document.getElementById('data-container');
            const track = data.track;
            const content = `
                <div class="data-display">
                    <img src="${track.images?.coverart || ''}" alt="Cover art">
                    <div>
                        <h2>${track.title || 'Unknown Title'}</h2>
                        <p><strong>Artist:</strong> ${track.subtitle || 'Unknown Artist'}</p>
                        <p><strong>Genre:</strong> ${track.genres?.primary || 'N/A'}</p>
                    </div>
                </div>
            `;
            container.innerHTML = content;
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
