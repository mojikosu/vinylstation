<!DOCTYPE html>
<html>
<head>
<title>Welcome to Vinylstation</title>
<style>
html { color-scheme: light dark; }
body {
    margin: 0;
    padding: 0;
    font-family: Tahoma, Verdana, Arial, sans-serif;
    background-image: url('img/vinylstationbackground.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    height: 100vh;
    position: relative;
    transition: color 0.5s ease; /* smooth colour transition */
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-color: rgba(50, 50, 50, 0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 0;
}

body > * {
    position: relative;
    z-index: 1;
}
</style>
</head>
<body>
   <center><h1>Now playing on Vinylstation</h1>
    <div id="data-container">Loading data...</div>
    <script>
        let previousData = null;

        /**
         * Samples an image URL and returns its average luminance (0–255).
         * Resolves even on CORS errors so the page never breaks.
         */
        function getAverageLuminance(imageUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Sample a small thumbnail for performance
                    canvas.width  = 50;
                    canvas.height = 50;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 50, 50);
                    const { data } = ctx.getImageData(0, 0, 50, 50);
                    let total = 0;
                    for (let i = 0; i < data.length; i += 4) {
                        // Perceived luminance weights
                        total += data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                    }
                    resolve(total / (data.length / 4));
                };
                img.onerror = () => resolve(128); // Fallback: assume mid-tone
                img.src = imageUrl;
            });
        }

        /**
         * Adjusts body text colour based on background brightness.
         * The gray overlay darkens the image, so we account for that by
         * blending the overlay colour into the luminance calculation.
         */
        async function adaptTextColour(imageUrl) {
            const rawLuminance = await getAverageLuminance(imageUrl);
            // The overlay is rgba(50,50,50,0.5) — blend at 50% opacity
            const overlayLuminance = 50;
            const overlayOpacity  = 0.5;
            const effectiveLuminance = rawLuminance * (1 - overlayOpacity)
                                     + overlayLuminance * overlayOpacity;

            // If the resulting background is dark, use white text, otherwise dark
            document.body.style.color = effectiveLuminance < 128 ? '#ffffff' : '#1a1a1a';
        }

        async function fetchData() {
            try {
                console.log("Fetching JSON data...");
                const response = await fetch('song.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                console.log("JSON data fetched successfully:", data);

                // Set background image
                const bgUrl = data.track.images.background;
                if (bgUrl) {
                    document.body.style.backgroundImage = `url('${bgUrl}')`;
                    await adaptTextColour(bgUrl);
                }

                // Check if data has changed
                if (JSON.stringify(data) !== JSON.stringify(previousData)) {
                    console.log("Data has changed. Updating UI...");
                    updateUI(data);
                    previousData = data;
                } else {
                    console.log("No changes detected in data.");
                }
            } catch (error) {
                console.error("Error fetching data:", error.message);
                document.getElementById('data-container').textContent =
                    `Error loading data: ${error.message}`;
            }
        }

        function updateUI(data) {
            const container = document.getElementById('data-container');
            if (data.background) {
                document.body.style.backgroundImage = `url('${data.background}')`;
            }
            const content = `
                <div class="data-display">
                    <img src="${data.track.images.coverart}" alt="${data.track.title} cover art">
                    <div>
                        <h2>${data.track.title}</h2>
                        <p><strong>Artist:</strong> ${data.track.subtitle}</p>
                        <p><strong>Album:</strong> ${data.track.sections.metadata}</p>
                        <p><strong>Released:</strong> ${data.track.sections.metadata}</p>
                        <p><strong>Genre:</strong> ${data.track.genres.primary}</p>
                    </div>
                </div>
            `;
            container.innerHTML = content;
        }

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</center>
</body>
</html>
